<section class="section experience__section">
  <div class="container">
    <p class="section__title">Expériences</p>
    <h2 class="section__subtitle">Les défis qui m'ont fait grandir</h2>

    <!-- Design moderne avec cartes animées -->
    <div class="experience__grid">
      <div *ngFor="let exp of experiences; let i = index" 
           class="experience__card"
           [style.border-left-color]="exp.color"
           [attr.data-index]="i">
        
        <!-- En-tête avec période et type -->
        <div class="experience__header">
          <div class="experience__meta">
            <span class="experience__period">{{ exp.period }}</span>
            <span class="experience__type" 
                  [class.experience__type--stage]="exp.type === 'stage'"
                  [class.experience__type--projet]="exp.type === 'projet'">
              {{ exp.type === 'stage' ? '🎓 Stage' : '💼 Projet' }}
            </span>
          </div>
          <div class="experience__location">📍 {{ exp.location }}</div>
        </div>

        <!-- Contenu principal -->
        <div class="experience__content">
          <h3 class="experience__title">{{ exp.title }}</h3>
          <p class="experience__company">{{ exp.company }}</p>
          <p class="experience__description">{{ exp.description }}</p>
        </div>

        <!-- Compétences -->
        <div class="experience__skills">
          <span *ngFor="let skill of exp.skills" 
                class="experience__skill"
                [style.background-color]="exp.color + '20'"
                [style.color]="exp.color">
            {{ skill }}
          </span>
        </div>

        <!-- Indicateur visuel -->
        <div class="experience__indicator" [style.background-color]="exp.color"></div>
      </div>
    </div>

    <!-- Animation de fond -->
    <div class="experience__bg-animation">
      <div class="experience__bg-line" *ngFor="let line of [1,2,3,4]" 
           [style.animation-delay]="(line * 0.5) + 's'"></div>
    </div>
  </div>
</section>
