<section id="skills" class="section skills__section">
  <div class="container">
    <p class="section__title">Compétences</p>
    <h2 class="section__subtitle">Mes stacks & outils</h2>

    <!-- Défilement automatique bas → haut avec logos -->
    <div class="skills__scroll-wrap">
      <div class="skills__scroll-track">
        <div class="skills__grid skills__grid--scroll">
          <div *ngFor="let skill of skills; let i = index" class="skills__card" 
               [style.background]="skill.color + '15'"
               [style.borderColor]="skill.color + '40'">
            <div class="skills__icon-wrapper">
              <span class="skills__icon-emoji">{{ skill.icon }}</span>
            </div>
            <div class="skills__info">
              <h4 class="skills__name">{{ skill.name }}</h4>
              <p class="skills__category">{{ skill.category }}</p>
            </div>
          </div>
        </div>
        <!-- Copie pour boucle infinie -->
        <div class="skills__grid skills__grid--scroll">
          <div *ngFor="let skill of skills; let i = index" class="skills__card" 
               [style.background]="skill.color + '15'"
               [style.borderColor]="skill.color + '40'">
            <div class="skills__icon-wrapper">
              <span class="skills__icon-emoji">{{ skill.icon }}</span>
            </div>
            <div class="skills__info">
              <h4 class="skills__name">{{ skill.name }}</h4>
              <p class="skills__category">{{ skill.category }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
