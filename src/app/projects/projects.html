<section class="section">
  <div class="container">
    <p class="section__title">Projets</p>
    <h2 class="section__subtitle">Mes réalisations principales</h2>

    <div *ngIf="error" class="projects__status projects__status--error">
      {{ error }}
    </div>

    <div *ngIf="!error" class="projects__grid">
      <article *ngFor="let p of projects; let i = index" class="card projects__card">
        <header class="projects__card-header">
          <div class="projects__topline">
            <span class="projects__index">{{ (i + 1) | number: '2.0-0' }}</span>
            <span class="pill" *ngIf="p.technologies?.includes('Angular')">Angular · API REST</span>
          </div>
          <h3 class="projects__title">{{ p.title }}</h3>
        </header>

        <p class="card__body">
          {{ p.description }}
        </p>

        <p *ngIf="p.pointsCle" class="projects__key">
          <span class="projects__key-label">Points clés</span>
          <span class="projects__key-text">{{ p.pointsCle }}</span>
        </p>

        <div class="projects__tags" aria-label="Technologies du projet">
          <span *ngFor="let t of p.technologies" class="projects__tag">{{ t }}</span>
        </div>

        <div class="projects__links">
          <a
            *ngIf="p.githubUrl"
            class="btn btn--ghost"
            [href]="p.githubUrl"
            target="_blank"
            rel="noopener noreferrer"
          >
            GitHub
          </a>
          <a
            *ngIf="p.demoUrl"
            class="btn btn--primary"
            [href]="p.demoUrl"
            target="_blank"
            rel="noopener noreferrer"
          >
            Démo en ligne
          </a>
        </div>
      </article>
    </div>
  </div>
</section>
